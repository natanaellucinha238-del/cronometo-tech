<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Tech Pro</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="container">
        <div class="timer-box">
            <div class="reflection"></div>
            <div class="display">
                <span id="minutes">00</span>:<span id="seconds">00</span>:<span id="milliseconds">00</span>
            </div>
            <div class="controls">
                <button id="startBtn" onclick="start()">INICIAR</button>
                <button id="pauseBtn" onclick="pause()">PAUSAR</button>
                <button id="resetBtn" onclick="reset()">REINICIAR</button>
            </div>
        </div>
    </div>

    <script src="scripts3.js"></script>
</body>
</html>
